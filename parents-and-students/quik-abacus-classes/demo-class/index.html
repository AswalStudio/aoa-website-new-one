<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book My No-Fee-Class | AOA Next-Gen</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <link
      rel="shortcut icon"
      href="https://image1.jdomni.in/storeLogo/23022026/23/0A/4A/6F82981B0A8135832085D87DAE_1771865831290.png?output-format=webp"
    />

    <style>
      :root {
        --primary: #1b4d3e;
        --primary-dark: #0f2e25;
        --accent: #c5a059;
        --bg-base: #f1f5f9;
        --glass-bg: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(255, 255, 255, 0.4) 100%
        );
        --glass-border: 1px solid rgba(255, 255, 255, 0.7);
        --text-main: #0f172a;
        --text-muted: #475569;
        --glass-blur: blur(24px);
        --radius-lg: 32px;
        --shadow-soft: 0 30px 60px -12px rgba(27, 77, 62, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        color: var(--text-main);
        line-height: 1.6;
        margin: 0;
        padding: 0;
        background-color: var(--bg-base);
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(197, 160, 89, 0.15) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 0%,
            rgba(27, 77, 62, 0.1) 0px,
            transparent 50%
          );
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 60px 24px 60px;
      }

      .page-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .page-header h1 {
        font-family: "Cinzel", serif;
        color: var(--primary);
        font-size: 42px;
        margin-bottom: 5px;
      }
      .page-header h2 {
        font-family: "Inter", sans-serif;
        color: var(--accent);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0;
      }

      .form-card {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: var(--glass-border);
        border-radius: var(--radius-lg);
        padding: 40px;
        box-shadow: var(--shadow-soft);
      }

      .section-title {
        font-family: "Cinzel", serif;
        color: var(--primary-dark);
        font-size: 20px;
        border-bottom: 2px solid rgba(197, 160, 89, 0.3);
        padding-bottom: 10px;
        margin: 30px 0 20px;
      }
      .section-title:first-child {
        margin-top: 0;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
      .full-width {
        grid-column: span 2;
      }

      .input-group {
        display: flex;
        flex-direction: column;
      }
      .input-group label {
        font-size: 12px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .input-group label span {
        color: #ef4444;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-prefix {
        position: absolute;
        left: 15px;
        color: var(--text-muted);
        font-weight: 600;
        font-size: 15px;
      }

      .input-group input,
      .input-group select,
      .input-group textarea {
        padding: 14px 20px;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        font-family: "Inter", sans-serif;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.7);
        outline: none;
        transition: 0.3s;
        width: 100%;
      }
      .input-group input.has-prefix {
        padding-left: 50px;
      }

      .input-group input:focus,
      .input-group select:focus,
      .input-group textarea:focus {
        border-color: var(--accent);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
      }

      .char-counter {
        font-size: 12px;
        color: var(--text-muted);
        text-align: right;
        margin-top: 6px;
        font-weight: 500;
      }

      .btn-submit {
        background: var(--primary);
        color: #fff;
        border: none;
        padding: 18px 30px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 16px;
        width: 100%;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        box-shadow: 0 10px 20px rgba(27, 77, 62, 0.2);
        margin-top: 30px;
      }
      .btn-submit:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }
      .btn-submit:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
        transform: none;
      }

      /* Success Screen */
      .success-screen {
        display: none;
        text-align: center;
        padding: 60px 20px;
      }
      .success-icon {
        width: 90px;
        height: 90px;
        background: rgba(16, 185, 129, 0.1);
        border: 2px solid #10b981;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 40px;
        color: #059669;
      }
      .success-screen h2 {
        font-family: "Cinzel", serif;
        color: var(--primary);
        font-size: 28px;
        margin-bottom: 12px;
      }
      .success-screen p {
        color: var(--text-muted);
        font-size: 16px;
        max-width: 420px;
        margin: 0 auto 8px;
      }

      #statusMessage {
        margin-top: 20px;
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        font-weight: 600;
        display: none;
      }
      .status-error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #f87171;
      }

      @media (max-width: 768px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .full-width {
          grid-column: span 1;
        }
        .form-card {
          padding: 24px;
        }
        .page-header h1 {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="container">
      <div class="page-header">
        <h1>Book My No-Fee-Class</h1>
        <h2>Free Trial Class</h2>
      </div>

      <div class="form-card">
        <form id="trialClassForm">
          <h2 class="section-title">Parent Information</h2>
          <div class="form-grid">
            <div class="input-group">
              <label>Participant's Parent Name <span>*</span></label>
              <input
                type="text"
                id="parent_name"
                required
                placeholder="Enter parent's full name"
              />
            </div>

            <div class="input-group">
              <label>Mobile Number <span>*</span></label>
              <div class="input-wrapper">
                <span class="input-prefix">+91</span>
                <input
                  type="tel"
                  id="mobile_number"
                  class="has-prefix"
                  required
                  placeholder="Enter mobile number"
                  pattern="[0-9]{10}"
                  title="Please enter a valid 10-digit mobile number"
                />
              </div>
            </div>

            <div class="input-group full-width">
              <label>Email (Optional)</label>
              <input
                type="email"
                id="email"
                placeholder="Enter email address"
              />
            </div>
          </div>

          <h2 class="section-title">Student Information</h2>
          <div class="form-grid">
            <div class="input-group">
              <label>Student's Name <span>*</span></label>
              <input
                type="text"
                id="student_name"
                required
                placeholder="Enter student's name"
                oninput="this.value = this.value.toUpperCase()"
              />
            </div>

            <div class="input-group">
              <label>Student's Gender <span>*</span></label>
              <select id="student_gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>

            <div class="input-group">
              <label>Student Age <span>*</span></label>
              <input
                type="number"
                id="student_age"
                required
                placeholder="Enter age"
                min="3"
                max="25"
              />
            </div>
          </div>

          <h2 class="section-title">Class Preferences</h2>
          <div class="form-grid">
            <div class="input-group full-width">
              <label
                >My Preferred Day & Time of Trial Class <span>*</span></label
              >
              <input type="datetime-local" id="preferred_datetime" required />
            </div>

            <div class="input-group full-width">
              <label>Message (Optional)</label>
              <textarea
                id="message"
                rows="3"
                maxlength="1000"
                placeholder="Any specific requirements or questions?"
              ></textarea>
              <div class="char-counter">
                <span id="charCount">0</span> of 1000 characters
              </div>
            </div>
          </div>

          <button type="submit" id="submitBtn" class="btn-submit">
            Confirm Booking <i class="fa-regular fa-calendar-check"></i>
          </button>

          <div id="statusMessage"></div>
        </form>

        <div class="success-screen" id="successScreen">
          <div class="success-icon"><i class="fa-solid fa-check"></i></div>
          <h2>Booking Request Sent!</h2>
          <p>Thank you for requesting a free trial class.</p>
          <p>
            Our academic coordinator will contact you shortly to confirm your
            preferred time slot.
          </p>
        </div>
      </div>
    </div>

    <script src="/js/header.js"></script>
    <script>
      // Character Counter Logic
      const messageInput = document.getElementById("message");
      const charCountDisplay = document.getElementById("charCount");

      messageInput.addEventListener("input", function () {
        charCountDisplay.textContent = this.value.length;
      });

      // Supabase Integration
      const DB_URL = "https://azdhqelzwptdyjypjkcb.supabase.co";
      const DB_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6ZGhxZWx6d3B0ZHlqeXBqa2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjQwODEsImV4cCI6MjA5MTY0MDA4MX0.g6YLwLhe_pG_27FQlKgwlrDDlsqeory5s5HWSTe3nKA";
      const db = window.supabase.createClient(DB_URL, DB_KEY);

      const form = document.getElementById("trialClassForm");
      const submitBtn = document.getElementById("submitBtn");
      const statusMsg = document.getElementById("statusMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
        statusMsg.style.display = "none";

        const formData = {
          parent_name: document.getElementById("parent_name").value.trim(),
          mobile_number:
            "+91 " + document.getElementById("mobile_number").value.trim(),
          email: document.getElementById("email").value.trim(), // <-- Updated this line
          student_name: document.getElementById("student_name").value.trim(),
          student_gender: document.getElementById("student_gender").value,
          student_age: parseInt(document.getElementById("student_age").value),
          preferred_datetime:
            document.getElementById("preferred_datetime").value,
          message: document.getElementById("message").value.trim() || null,
        };
        try {
          // IMPORTANT: Make sure the 'free_trial_bookings' table exists in Supabase
          const { error } = await db
            .from("free_trial_bookings")
            .insert([formData]);

          if (error) throw error;

          // Show success screen
          form.style.display = "none";
          document.getElementById("successScreen").style.display = "block";
        } catch (err) {
          statusMsg.textContent = "Submission failed: " + err.message;
          statusMsg.className = "status-error";
          statusMsg.style.display = "block";
          submitBtn.disabled = false;
          submitBtn.innerHTML =
            'Confirm Booking <i class="fa-regular fa-calendar-check"></i>';
        }
      });
    </script>
  </body>
</html>
